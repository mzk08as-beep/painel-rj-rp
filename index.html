<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo RJ RP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#002776,#009c3b,#ffdf00);
min-height:100vh;color:white;
}
.container{width:95%;max-width:1200px;margin:auto}
.login{height:100vh;display:flex;align-items:center;justify-content:center}
.card,.box{
background:#08101fee;padding:25px;border-radius:20px;
box-shadow:0 0 30px #000;
}
.card{width:380px}
input,textarea,button{
width:100%;padding:12px;margin:8px 0;
border-radius:10px;border:0;
}
input,textarea{background:#111827;color:white}
button{background:#ffdf00;font-weight:bold;cursor:pointer}
.hidden{display:none}
header{margin-top:20px}
.grid{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-top:20px}
.rule{background:#111827;padding:12px;margin:8px 0;border-radius:10px;cursor:pointer}
pre{background:#000;padding:15px;border-radius:15px;white-space:pre-wrap}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login" class="login">
<div class="card">
<h2>🏛️ Administração RJ RP</h2>
<input id="admin" placeholder="Administrador">
<input id="pass" type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div id="painel" class="container hidden">
<header class="box">
<h1>🇧🇷 Painel Administrativo RJ RP</h1>
<p>Registro de punições</p>
</header>

<div class="grid">

<div class="box">
<h3>📚 Infrações</h3>
<div class="rule" onclick="setR('DM','Demorgan 60 minutos')">DM</div>
<div class="rule" onclick="setR('VDM','60 minutos')">VDM</div>
<div class="rule" onclick="setR('MG','Mute 60 minutos')">MG</div>
<div class="rule" onclick="setR('BUG','15-30 dias')">BUG</div>
<div class="rule" onclick="setR('RMT','Permanente')">RMT</div>
</div>

<div class="box">
<h2>📋 Nova Punição</h2>

<input id="op" placeholder="Administrador">
<input id="acusado" placeholder="Acusado">
<input id="infra" placeholder="Infração">
<input id="pena" placeholder="Punição">
<input id="provas" placeholder="Link das provas">
<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="gerar()">Gerar Log</button>
<button onclick="copiar()">Copiar</button>

<pre id="log">Nenhum log criado.</pre>

</div>

</div>
</div>

<script>
function entrar(){
if(pass.value!="admin123"){
alert("Senha incorreta");
return;
}
login.classList.add("hidden");
painel.classList.remove("hidden");
op.value=admin.value;
}

function setR(i,p){
infra.value=i;
pena.value=p;
}

function gerar(){
log.textContent=
`🏛️ REGISTRO OFICIAL RJ RP

Administrador: ${op.value}
Acusado: ${acusado.value}
Infração: ${infra.value}
Punição: ${pena.value}
Provas: ${provas.value}

Observações:
${obs.value}

Data:
${new Date().toLocaleString("pt-BR")}`;
}

function copiar(){
navigator.clipboard.writeText(log.textContent);
alert("Copiado!");
}
</script>

</body>
</html>
